name: Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Android setup
        uses: ./.github/actions/android-setup

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        run: ./gradlew detekt

