name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

#concurrency:
#  group: android-ci-${{ github.workflow }}-${{ github.ref }}
#  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > ./local.properties
          echo "CLARITY_PROJECT_ID=${{secrets.CLARITY_PROJECT_ID}}" >> ./local.properties
          echo "MASTER_KEY=${{secrets.MASTER_KEY}}" >> ./local.properties
        shell: bash

      - name: Decode and set up google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE_64 }}" | base64 --decode > ./app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Assemble DEBUG APK
        run: ./gradlew assembleDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
