name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Android setup
        uses: ./.github/actions/android-setup
        with:
          needs-secrets: "true"
        env:
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          GOOGLE_SERVICES_JSON_BASE_64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE_64 }}

      - name: Run DEBUG Unit Tests
        run: ./gradlew testDebugUnitTest
